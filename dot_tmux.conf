# Minimal tmux — mouse, history, splits, readable status (no TPM).

set -g mouse on
set -g history-limit 50000

# Prefix stays default Ctrl-b; splits match keyboard glyphs
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Status — Tokyo Night–adjacent (256 colours; works without truecolour terminal)
set -g status-interval 5
set -g status-left-length 40
set -g status-style "bg=colour235,fg=colour252"
set -g status-left "#[fg=colour149,bold]#S#[default] "
set -g status-right "#[fg=colour117]#h#[default] #[fg=colour144]%Y-%m-%d %H:%M#[default] "
setw -g window-status-current-style "fg=colour235,bg=colour111,bold"
setw -g window-status-style "fg=colour246"

set -g base-index 1
setw -g pane-base-index 1
