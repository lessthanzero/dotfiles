# Minimal tmux — mouse, history, splits, readable status (no TPM).

set -g mouse on
set -g history-limit 50000

# Prefix stays default Ctrl-b; splits match keyboard glyphs
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Status: session | windows … | host | clock
set -g status-interval 5
set -g status-left-length 40
set -g status-style "bg=colour235,fg=colour252"
set -g status-left "#[fg=green,bold]#S#[default] "
set -g status-right "#[fg=cyan]#h#[default] #[fg=yellow]%Y-%m-%d %H:%M#[default] "
setw -g window-status-current-style "fg=colour255,bold"
setw -g window-status-style "fg=colour244"

set -g base-index 1
setw -g pane-base-index 1
