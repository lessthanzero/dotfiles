# Managed by chezmoi — Tokyo Night (folke/tokyonight.nvim) + JetBrains Mono Nerd Font
# Upstream: https://github.com/folke/tokyonight.nvim/blob/main/extras/kitty/tokyonight_night.conf

font_family      JetBrainsMono Nerd Font
font_size        13.0
bold_font        auto
italic_font      auto
bold_italic_font auto
disable_ligatures never

# Login + interactive so .zprofile/.zshrc run (macOS Kitty especially)
shell            zsh --login --interactive
term             xterm-256color
scrollback_lines 50000
window_padding_width 4
confirm_os_window_close 0

foreground              #c0caf5
background              #1a1b26
selection_foreground    #c0caf5
selection_background    #283457
url_color               #73daca

cursor                  #c0caf5
cursor_text_color       #1a1b26

active_tab_background   #7aa2f7
active_tab_foreground   #16161e
inactive_tab_background #292e42
inactive_tab_foreground #545c7e

active_border_color   #7aa2f7
inactive_border_color #292e42

color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6
color8  #414868
color9  #ff899d
color10 #9fe044
color11 #faba4a
color12 #8db0ff
color13 #c7a9ff
color14 #a4daff
color15 #c0caf5
color16 #ff9e64
color17 #db4b4b

macos_option_as_alt yes

map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map shift+cmd+c copy_or_interrupt
map shift+cmd+v paste_from_clipboard
