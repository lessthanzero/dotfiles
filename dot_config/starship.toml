# Compact, state-focused prompt. Tweak locally if needed.

format = "$username$hostname$directory$git_branch$git_status$cmd_duration$character"

command_timeout = 2000

[character]
success_symbol = "[>](bold green) "
error_symbol = "[>](bold red) "
vimcmd_symbol = "[<](bold green) "

[username]
style_user = "bold white"
style_root = "bold red"

# Prominent on SSH; hidden on local sessions to save space
[hostname]
ssh_only = true
style = "bold yellow"
format = "[$hostname]($style) "

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
style = "bold purple"

[git_status]
style = "bold yellow"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold dimmed"
